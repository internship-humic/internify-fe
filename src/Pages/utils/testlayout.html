<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Grenze:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="preview" style="max-width: 100%;"></canvas>
  <script>
    // Helper: bungkus loading image jadi Promise, biar bisa di-await
    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function draw() {
      await document.fonts.ready;

      // Load template sertifikat & QR dummy secara paralel
      const [templateImg, qrImg] = await Promise.all([
        loadImage("http://localhost:9000/uploads/1783080498359-420570422.png"),
        loadImage("https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=dummy-uuid-preview")
      ]);

      const canvas = document.getElementById("preview");
      canvas.width = templateImg.naturalWidth;
      canvas.height = templateImg.naturalHeight;
      const ctx = canvas.getContext("2d");

      // 1. Gambar template dulu (paling belakang)
      ctx.drawImage(templateImg, 0, 0);

      // 2. Nama intern — Great Vibes
      ctx.font = `105px "Great Vibes", cursive`;
      ctx.fillStyle = "#800000";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("Jonathan Kristina", canvas.width * 0.57, canvas.height * 0.48);

      ctx.font = `30px "Great Vibes", cursive`;
      ctx.fillText("Jonathan Kristina", canvas.width * 0.825, canvas.height * 0.895);

      // 3. Nama project — Grenze
      ctx.font = `400 54px "Grenze", serif`;
      ctx.fillStyle = "#090909";
      ctx.fillText("Internify Platform Dev", canvas.width * 0.57, canvas.height * 0.615);

      ctx.font = `400 48px "Grenze", serif`;
      ctx.fillStyle = "#090909";
      ctx.fillText("20 April - 20 Juni 2025", canvas.width * 0.68, canvas.height * 0.66);

      // 4. Certificate no
      ctx.font = `50px Grenze`;
      ctx.fillText("CERT/20260609/PRJ2/USR5", canvas.width * 0.665, canvas.height * 0.305);

      ctx.font = `20px Grenze`;
      ctx.fillStyle = "#800000";
      ctx.fillText("CERT/20260609/PRJ2/USR5", canvas.width * 0.825, canvas.height * 0.918);

      const qrSize = canvas.width * 0.103;
      const qrX = canvas.width * 0.855;
      const qrY = canvas.height * 0.85;
      ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
    }

    draw();
  </script>
</body>
</html>
