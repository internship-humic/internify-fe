<!-- test-cert.html — buka langsung di browser -->
<!DOCTYPE html>
<html>
<body>
  <canvas id="preview"></canvas>
  <script>
    // GANTI INI UNTUK MENGGUNAKAN TEMPLATE YANG BERBEDA
    const templateUrl = "http://localhost:9000/uploads/template.png"; // ganti URL template

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const canvas = document.getElementById("preview");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      // Nama
      ctx.font = "bold 48px Georgia, serif";
      ctx.fillStyle = "#800000";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("Rafi Athallah", canvas.width / 2, canvas.height * 0.55);

      // Project
      ctx.font = "24px Georgia, serif";
      ctx.fillStyle = "#444444";
      ctx.fillText("Internify Platform Dev", canvas.width / 2, canvas.height * 0.65);

      // UUID
      ctx.font = "16px monospace";
      ctx.fillStyle = "#888888";
      ctx.fillText("CERT/20260609/PRJ2/USR5", canvas.width / 2, canvas.height * 0.88);
    };
    img.src = templateUrl;
  </script>
</body>
</html>
