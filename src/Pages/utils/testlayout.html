<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Grenze:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="preview" style="max-width: 100%;"></canvas>

  <script>
    const TEMPLATE_PATH = "../../assets/template.png";

    // LAYOUT
    const LAYOUT = {
      internName:      { x: 0.57,  y: 0.48,  size: 140, font: "Great Vibes", color: "#800000" },
      internNameSmall: { x: 0.82, y: 0.889, size: 33,  font: "Great Vibes", color: "#800000" },
      projectName:     { x: 0.815,  y: 0.598, size: 46,  font: "Grenze",      color: "#090909" },
      duration:        { x: 0.692,  y: 0.645,  size: 48,  font: "Grenze",      color: "#090909" },
      certNo:          { x: 0.6, y: 0.305, size: 50,  font: "Grenze",      color: "#090909" },
      certNoSmall:     { x: 0.825, y: 0.91, size: 22,  font: "Grenze",      color: "#800000" },
      qr:              { x: 0.77, y: 0.715,  size: 0.103 },
    };

    const DATA = {
      internName:  "Jonathan Kristina",
      projectName: "Internify Proyek Humic",
      duration:    "20 April 2026 - 20 Juni 2026",
      certNo:      "CERT/XXXXXX/1",
      verifyUrl:   "dummy-uuid-preview",
    };

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Gagal load gambar: " + src));
        img.src = src;
      });
    }

    async function ensureFontsLoaded() {
      await Promise.all([
        document.fonts.load('400 105px "Great Vibes"'),
        document.fonts.load('400 54px "Grenze"'),
      ]);
      await document.fonts.ready;
    }

    async function draw() {
      await ensureFontsLoaded();

      const templateImg = await loadImage(TEMPLATE_PATH);

      const canvas = document.getElementById("preview");
      canvas.width = templateImg.naturalWidth;
      canvas.height = templateImg.naturalHeight;
      const ctx = canvas.getContext("2d");

      ctx.drawImage(templateImg, 0, 0);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const text = (cfg, value) => {
        ctx.font = `400 ${cfg.size}px "${cfg.font}", serif`;
        ctx.fillStyle = cfg.color;
        ctx.fillText(value, canvas.width * cfg.x, canvas.height * cfg.y);
      };

      text(LAYOUT.internName,      DATA.internName);
      text(LAYOUT.internNameSmall, DATA.internName);
      text(LAYOUT.projectName,     DATA.projectName);
      text(LAYOUT.duration,        DATA.duration);
      text(LAYOUT.certNo,          DATA.certNo);
      text(LAYOUT.certNoSmall,     DATA.certNo);

      // QR
      const qrSize = Math.round(canvas.width * LAYOUT.qr.size);
      ctx.fillStyle = "#000";
      ctx.fillRect(canvas.width * LAYOUT.qr.x, canvas.height * LAYOUT.qr.y, qrSize, qrSize);
    }

    draw().catch((err) => {
      document.body.insertAdjacentHTML("beforeend", `<pre style="color:red">${err.message}</pre>`);
    });
  </script>
</body>
</html>
